<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Closing</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:"Segoe UI",Arial,sans-serif;

    background:
    radial-gradient(circle at center,
    #111 0%,
    #050505 45%,
    #000 100%);

}

/* Background glow sangat halus */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    radial-gradient(circle,
    rgba(255,255,255,.03) 0%,
    rgba(255,255,255,.015) 35%,
    transparent 75%);

    animation:
    backgroundPulse 10s ease-in-out infinite;

}

/* =========================== */

.container{

    text-align:center;

    animation:
    breathing 8s ease-in-out infinite;

}

/* =========================== */

.title{

    position:relative;

    color:#fff;

    font-size:48px;

    font-weight:600;

    letter-spacing:8px;

    opacity:0;

    text-shadow:
    0 0 8px rgba(255,255,255,.10);

    animation:
    titleIn 1s ease forwards,
    glow 6s ease-in-out infinite 1s;

}

/* Cahaya tipis */

.title::after{

    content:"";

    position:absolute;

    top:-30%;

    left:-160%;

    width:40%;

    height:170%;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.45),
    transparent);

    transform:skewX(-25deg);

    animation:
    sweep 9s linear infinite 4s;

}

/* =========================== */

.subtitle{

    margin-top:16px;

    color:#fff;

    font-size:16px;

    font-weight:300;

    letter-spacing:6px;

    opacity:0;

    text-shadow:
    0 0 5px rgba(255,255,255,.08);

    animation:
    subtitleIn 1s ease forwards .3s,
    glowSmall 6s ease-in-out infinite 1.3s;

}

/* =========================== */

@keyframes titleIn{

    from{

        opacity:0;

        transform:
        translateY(25px);

        letter-spacing:20px;

    }

    to{

        opacity:1;

        transform:
        translateY(0);

        letter-spacing:8px;

    }

}

@keyframes subtitleIn{

    from{

        opacity:0;

        transform:
        translateY(18px);

        letter-spacing:14px;

    }

    to{

        opacity:1;

        transform:
        translateY(0);

        letter-spacing:6px;

    }

}

/* =========================== */

@keyframes glow{

    0%{

        text-shadow:
        0 0 6px rgba(255,255,255,.08);

    }

    50%{

        text-shadow:
        0 0 14px rgba(255,255,255,.28),
        0 0 28px rgba(255,255,255,.10);

    }

    100%{

        text-shadow:
        0 0 6px rgba(255,255,255,.08);

    }

}

@keyframes glowSmall{

    0%{

        text-shadow:
        0 0 4px rgba(255,255,255,.05);

    }

    50%{

        text-shadow:
        0 0 10px rgba(255,255,255,.18);

    }

    100%{

        text-shadow:
        0 0 4px rgba(255,255,255,.05);

    }

}

/* =========================== */

@keyframes breathing{

    0%{

        transform:scale(1);

    }

    50%{

        transform:scale(1.01);

    }

    100%{

        transform:scale(1);

    }

}

/* =========================== */

@keyframes backgroundPulse{

    0%{

        opacity:.4;

        transform:scale(1);

    }

    50%{

        opacity:.75;

        transform:scale(1.05);

    }

    100%{

        opacity:.4;

        transform:scale(1);

    }

}

/* =========================== */

@keyframes sweep{

    0%{

        left:-160%;
        opacity:0;

    }

    8%{

        opacity:.7;

    }

    22%{

        left:160%;
        opacity:0;

    }

    100%{

        left:160%;
        opacity:0;

    }

}

</style>

</head>

<body>

<div class="container">

    <div class="title">
        TERIMA KASIH
    </div>

    <div class="subtitle">
        SUDAH MENONTON
    </div>

</div>

</body>
</html>
