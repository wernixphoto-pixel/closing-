<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closing YouTube</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    font-family:"Segoe UI",Arial,sans-serif;

    background:
    radial-gradient(circle at center,
    #121212 0%,
    #060606 45%,
    #000 100%);

}

/* Background Glow */

body::before{

    content:"";

    position:fixed;
    inset:0;

    background:
    radial-gradient(circle,
    rgba(255,255,255,.03),
    transparent 70%);

    animation:
    backgroundPulse 8s ease-in-out infinite;

}

/* ========================= */

.container{

    text-align:center;

    animation:
    breathing 8s ease-in-out infinite;

}

/* ========================= */

.title,
.subtitle{

    position:relative;

    overflow:hidden;

    display:inline-block;

    color:#fff;

    white-space:nowrap;

}

/* ========================= */

.title{

    font-size:48px;

    font-weight:600;

    letter-spacing:8px;

    opacity:0;

    animation:
    titleIn 1s ease forwards,
    glowTitle 5s ease-in-out infinite 1s;

}

.subtitle{

    display:block;

    margin-top:16px;

    font-size:16px;

    font-weight:300;

    letter-spacing:6px;

    opacity:0;

    animation:
    subtitleIn 1s ease forwards .3s,
    glowSubtitle 5s ease-in-out infinite 1.3s;

}

/* ========================= */
/* SHIMMER TITLE */
/* ========================= */

.title::after{

    content:"";

    position:absolute;

    top:-40%;

    left:-170%;

    width:28%;

    height:180%;

    transform:skewX(-25deg);

    background:
    linear-gradient(
        90deg,
        rgba(255,255,255,0),
        rgba(255,255,255,.25),
        rgba(255,255,255,.95),
        rgba(255,255,255,.25),
        rgba(255,255,255,0)
    );

    filter:blur(3px);

    animation:
    shimmerTitle 6s linear infinite;

}

/* ========================= */
/* SHIMMER SUBTITLE */
/* ========================= */

.subtitle::after{

    content:"";

    position:absolute;

    top:-40%;

    left:-170%;

    width:28%;

    height:180%;

    transform:skewX(-25deg);

    background:
    linear-gradient(
        90deg,
        rgba(255,255,255,0),
        rgba(255,255,255,.20),
        rgba(255,255,255,.90),
        rgba(255,255,255,.20),
        rgba(255,255,255,0)
    );

    filter:blur(3px);

    animation:
    shimmerSubtitle 6s linear infinite;

    animation-delay:.35s;

}

/* ========================= */

@keyframes shimmerTitle{

    0%{

        left:-170%;
        opacity:0;

    }

    3%{

        opacity:1;

    }

    11%{

        left:170%;
        opacity:0;

    }

    100%{

        left:170%;
        opacity:0;

    }

}

@keyframes shimmerSubtitle{

    0%{

        left:-170%;
        opacity:0;

    }

    3%{

        opacity:1;

    }

    11%{

        left:170%;
        opacity:0;

    }

    100%{

        left:170%;
        opacity:0;

    }

}

/* ========================= */

@keyframes glowTitle{

    0%{

        text-shadow:
        0 0 5px rgba(255,255,255,.08);

    }

    50%{

        text-shadow:
        0 0 16px rgba(255,255,255,.28),
        0 0 35px rgba(255,255,255,.10);

    }

    100%{

        text-shadow:
        0 0 5px rgba(255,255,255,.08);

    }

}

@keyframes glowSubtitle{

    0%{

        text-shadow:
        0 0 3px rgba(255,255,255,.05);

    }

    50%{

        text-shadow:
        0 0 10px rgba(255,255,255,.20);

    }

    100%{

        text-shadow:
        0 0 3px rgba(255,255,255,.05);

    }

}

/* ========================= */

@keyframes breathing{

    0%{

        transform:scale(1);

    }

    50%{

        transform:scale(1.01);

    }

    100%{

        transform:scale(1);

    }

}

/* ========================= */

@keyframes backgroundPulse{

    0%{

        opacity:.4;
        transform:scale(1);

    }

    50%{

        opacity:.75;
        transform:scale(1.05);

    }

    100%{

        opacity:.4;
        transform:scale(1);

    }

}

/* ========================= */

@keyframes titleIn{

    from{

        opacity:0;

        transform:
        translateY(20px);

        letter-spacing:20px;

    }

    to{

        opacity:1;

        transform:
        translateY(0);

        letter-spacing:8px;

    }

}

@keyframes subtitleIn{

    from{

        opacity:0;

        transform:
        translateY(15px);

        letter-spacing:12px;

    }

    to{

        opacity:1;

        transform:
        translateY(0);

        letter-spacing:6px;

    }

}

</style>

</head>

<body>

<div class="container">

    <div class="title">
        TERIMA KASIH
    </div>

    <div class="subtitle">
        SUDAH MENONTON
    </div>

</div>

</body>
</html>
